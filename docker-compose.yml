services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: vel_exhibition
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
    environment:
      FLASK_APP: manage.py
      FLASK_ENV: development
      DATABASE_URL: postgresql+psycopg2://postgres:postgres@db:5432/vel_exhibition
    ports:
      - "5000:5000"
    depends_on:
      - db
    command: >
      sh -c "flask --app manage.py init-db &&
             flask --app manage.py run --host=0.0.0.0 --port=5000"

volumes:
  pgdata:
